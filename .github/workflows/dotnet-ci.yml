name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "yang" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore Dependencies
      run: dotnet restore Server/TriviaApi/TriviaApi.csproj

    - name: Build Project
      run: dotnet build Server/TriviaApi/TriviaApi.csproj --no-restore --configuration Release

  build-client:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: client/trivia-ui/package-lock.json

    - name: Install Dependencies
      run: npm ci
      working-directory: client/trivia-ui

    - name: Build Client
      run: npm run build
      working-directory: client/trivia-ui

  docker:
    needs: [build-server]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/yang'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t trivia-api ./Server/TriviaApi
